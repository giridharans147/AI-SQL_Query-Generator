<!DOCTYPE html>
<html>
<head>
    <title>AI SQL Query Generator</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <h1>🤖 AI SQL Query Generator</h1>

    <form method="POST">

        <input
        type="text"
        name="question"
        placeholder="Ask your SQL question..."
        required>

        <button type="submit">
            Generate SQL
        </button>

    </form>

    {% if result %}

    <div class="output">

        <h2>Generated SQL</h2>

        <p id="result">{{ result }}</p>

    </div>

    {% endif %}

    <div class="footer">
        Machine Learning Project | Flask + Python + Scikit-learn
    </div>

</div>

</body>
</html>
